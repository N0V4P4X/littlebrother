name: littlebrother_server
description: LittleBrother LAN Server - Control panel and crowdsourced data handling
version: 0.7.4
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── System tray ────────────────────────────────────────────────────────
  tray_manager: ^0.2.3

  # ── HTTP server ───────────────────────────────────────────────────────────
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  web_socket_channel: ^3.0.1

  # ── Storage ──────────────────────────────────────────────────────────────
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── Config ───────────────────────────────────────────────────────────────
  yaml: ^3.1.2

  # ── Compression ────────────────────────────────────────────────────────
  archive: ^4.0.2

  # ── Utilities ──────────────────────────────────────────────────────────
  uuid: ^4.4.2
  intl: ^0.20.2
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
