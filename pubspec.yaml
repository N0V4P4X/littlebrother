name: littlebrother
description: Passive RF intelligence platform — Wi-Fi, BLE, cellular SIGINT and IMSI detection.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Radio scanning ─────────────────────────────────────────────────────
  flutter_blue_plus: ^1.32.12       # BLE passive scan
  wifi_scan: ^0.4.1                 # Wi-Fi AP enumeration
  geolocator: ^12.0.0               # GPS positioning

  # ── Storage ────────────────────────────────────────────────────────────
  sqflite: ^2.3.3                   # Local SQLite
  path_provider: ^2.1.4             # App data directory
  path: ^1.9.0

  # ── UI / rendering ─────────────────────────────────────────────────────
  fl_chart: ^0.69.0                 # RSSI history graphs
  flutter_local_notifications: ^18.0.0  # Threat alerts + foreground service

  # ── Permissions ────────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Export / share ─────────────────────────────────────────────────────
  share_plus: ^10.0.0
  csv: ^6.0.0

  # ── Utilities ──────────────────────────────────────────────────────────
  uuid: ^4.4.2
  intl: ^0.19.0
  collection: ^1.18.0
  crypto: ^3.0.3                    # geohash + fingerprinting

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/oui/oui_table.json     # IEEE OUI lookup table (build-time generated)
