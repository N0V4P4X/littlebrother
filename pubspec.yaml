name: littlebrother
description: Passive RF intelligence platform — WiFi, BLE, cellular SIGINT and IMSI detection.
publish_to: 'none'
version: 0.7.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Radio scanning ─────────────────────────────────────────────────────
  flutter_blue_plus: ^2.2.1       # BLE passive scan
  wifi_scan: ^0.4.1               # Wi-Fi AP enumeration
  geolocator: ^14.0.2             # GPS positioning
  mqtt_client: ^10.0.0            # MQTT client for external signal ingestion

  # ── Storage ────────────────────────────────────────────────────────────
  sqflite: ^2.3.3                 # Local SQLite
  path_provider: ^2.1.4           # App data directory
  path: ^1.9.0

  # ── UI / rendering ─────────────────────────────────────────────────────
  fl_chart: ^0.69.0                # RSSI history graphs — pinned for compat
  flutter_local_notifications: '>=18.0.0 <19.0.0'  # pin to resolved v18 API
  flutter_map: ^7.0.0             # OpenStreetMap tiles (free, no API key)
  latlong2: ^0.9.0                 # Lat/lon utilities for flutter_map

  # ── Permissions ────────────────────────────────────────────────────────
  permission_handler: ^12.0.1

  # ── Export / share ─────────────────────────────────────────────────────
  share_plus: ^12.0.1
  csv: ^8.0.0

  # ── Utilities ──────────────────────────────────────────────────────────
  uuid: ^4.4.2
  intl: ^0.20.2
  collection: ^1.18.0
  crypto: ^3.0.3
  http: ^1.2.0
  flutter_cache_manager: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/oui/oui_table.json     # IEEE OUI lookup table (build-time generated)
    - assets/icons/ic_notification.png   # Notification large icon
